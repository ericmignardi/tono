name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new push lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Test-only placeholders. Real secrets should be provided via GitHub repository
# secrets for any job that needs to hit live services (we currently only need
# them to satisfy lib/config.ts's "must be set" check on module load).
env:
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
  CLERK_SECRET_KEY: sk_test_ci_placeholder
  CLERK_WEBHOOK_SECRET: whsec_ci_placeholder
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  GEMINI_API_KEY: ci_placeholder
  STRIPE_SECRET_KEY: sk_test_ci_placeholder
  STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
  NEXT_PUBLIC_STRIPE_PRICE_ID_PRO: price_ci_placeholder
  NEXT_PUBLIC_URL: http://localhost:3000
  UPSTASH_REDIS_REST_URL: https://ci-placeholder.upstash.io
  UPSTASH_REDIS_REST_TOKEN: ci_placeholder

jobs:
  lint-and-types:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Jest tests
        run: npm test -- --ci --runInBand

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [lint-and-types, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
